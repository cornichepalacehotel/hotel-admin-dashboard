<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Admin Panel</title>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-center text-blue-800">Hotel Rate Manager</h1>
        
        <div class="bg-white p-6 rounded shadow mb-6">
            <h2 class="font-bold text-lg mb-2">Add/Edit Room Type</h2>
            <div class="flex gap-2">
                <input type="text" id="roomName" placeholder="Room Name (e.g. Deluxe Suite)" class="border p-2 flex-grow rounded">
                <button onclick="addRoom()" class="bg-blue-600 text-white px-6 py-2 rounded font-bold hover:bg-blue-700">Add Room</button>
            </div>
        </div>
        
        <div id="calendar" class="bg-white p-6 rounded shadow"></div>
    </div>

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <script src="js/app.js"></script>
</body>
</html>
