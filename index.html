<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Admin Panel</title>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 p-6">
    <h1 class="text-3xl font-bold mb-6 text-center">Rate Manager</h1>
    
    <div class="max-w-4xl mx-auto">
        <div class="bg-white p-4 mb-4 rounded shadow">
            <h2 class="font-bold">Add/Edit Room Type</h2>
            <input type="text" id="roomName" placeholder="Room Name" class="border p-2">
            <button onclick="addRoom()" class="bg-blue-500 text-white p-2">Add Room</button>
        </div>
        
        <div id="calendar" class="bg-white p-4 rounded shadow"></div>
    </div>

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <script src="js/app.js"></script>
</body>
</html>
